<svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Geometric "C" initial with serif text -->
  <defs>
    <style>
      .logo-text { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 42px; font-weight: 400; letter-spacing: 0.15em; }
      .logo-accent { fill: #c8a96e; }
      .logo-dark { fill: #141414; stroke: #141414; stroke-width: 1.5; }
    </style>
  </defs>
  
  <!-- Geometric C circle (incomplete circle) -->
  <circle cx="22" cy="40" r="18" fill="none" class="logo-dark" stroke-dasharray="85 120"/>
  
  <!-- Inner accent dot -->
  <circle cx="22" cy="40" r="6" class="logo-accent"/>
  
  <!-- Text -->
  <text x="50" y="52" class="logo-text logo-dark">LAD</text>
</svg>